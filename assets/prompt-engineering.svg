<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 750" width="1260" height="750">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020c1b"/>
      <stop offset="50%" style="stop-color:#071a2e"/>
      <stop offset="100%" style="stop-color:#030d1f"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2137"/>
      <stop offset="100%" style="stop-color:#071525"/>
    </linearGradient>
    <linearGradient id="promptBubble" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#164e63"/>
    </linearGradient>
    <linearGradient id="responseBubble" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
    <linearGradient id="keyboardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="screenglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bubbleGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="screenHalo" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1260" height="750" fill="url(#bg2)"/>

  <!-- Subtle grid lines -->
  <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#0891b2" stroke-width="0.3" opacity="0.15"/>
  </pattern>
  <rect width="1260" height="750" fill="url(#grid)"/>

  <!-- Ambient glow -->
  <ellipse cx="630" cy="350" rx="500" ry="300" fill="url(#screenHalo)"/>
  <ellipse cx="200" cy="180" rx="250" ry="160" fill="#0891b2" opacity="0.04"/>
  <ellipse cx="1080" cy="580" rx="230" ry="150" fill="#0284c7" opacity="0.05"/>

  <!-- === Laptop body === -->
  <!-- Screen outer -->
  <rect x="310" y="170" width="640" height="390" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <!-- Screen bezel -->
  <rect x="320" y="180" width="620" height="370" rx="8" fill="url(#screenGrad)"/>
  <!-- Screen content area -->
  <rect x="335" y="195" width="590" height="340" rx="5" fill="#060e1a"/>

  <!-- Screen glow overlay -->
  <rect x="335" y="195" width="590" height="340" rx="5" fill="url(#screenHalo)"/>

  <!-- === Chat interface on screen === -->
  <!-- Header bar -->
  <rect x="335" y="195" width="590" height="38" rx="5" fill="#0c1f35"/>
  <circle cx="360" cy="214" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="380" cy="214" r="6" fill="#fbbf24" opacity="0.8"/>
  <circle cx="400" cy="214" r="6" fill="#22c55e" opacity="0.8"/>
  <!-- Title -->
  <rect x="540" y="208" width="80" height="12" rx="6" fill="#334155"/>

  <!-- User prompt bubble 1 -->
  <rect x="480" y="250" width="230" height="52" rx="12" fill="url(#promptBubble)" filter="url(#bubbleGlow)"/>
  <polygon points="710,268 725,275 710,282" fill="#164e63"/>
  <!-- Prompt text lines -->
  <rect x="496" y="262" width="180" height="8" rx="4" fill="#67e8f9" opacity="0.9"/>
  <rect x="496" y="276" width="140" height="8" rx="4" fill="#67e8f9" opacity="0.6"/>
  <rect x="496" y="290" width="100" height="6" rx="3" fill="#67e8f9" opacity="0.4"/>

  <!-- Cursor blink after text -->
  <rect x="600" y="290" width="2" height="10" fill="#67e8f9" opacity="0.9"/>

  <!-- AI response bubble 1 -->
  <rect x="345" y="322" width="260" height="68" rx="12" fill="url(#responseBubble)" opacity="0.9" filter="url(#bubbleGlow)"/>
  <polygon points="345,340 330,347 345,354" fill="#0e7490"/>
  <!-- Response text lines -->
  <rect x="360" y="334" width="210" height="8" rx="4" fill="#f0fdff" opacity="0.95"/>
  <rect x="360" y="348" width="220" height="8" rx="4" fill="#f0fdff" opacity="0.85"/>
  <rect x="360" y="362" width="180" height="8" rx="4" fill="#f0fdff" opacity="0.75"/>
  <rect x="360" y="376" width="140" height="6" rx="3" fill="#f0fdff" opacity="0.5"/>

  <!-- User prompt bubble 2 -->
  <rect x="490" y="408" width="210" height="40" rx="12" fill="url(#promptBubble)" filter="url(#bubbleGlow)" opacity="0.85"/>
  <polygon points="700,422 714,427 700,432" fill="#164e63"/>
  <rect x="505" y="420" width="160" height="7" rx="3" fill="#67e8f9" opacity="0.8"/>
  <rect x="505" y="432" width="120" height="7" rx="3" fill="#67e8f9" opacity="0.5"/>

  <!-- Typing indicator -->
  <rect x="345" y="462" width="80" height="30" rx="15" fill="#0c2d40" stroke="#0891b2" stroke-width="1"/>
  <circle cx="368" cy="477" r="4" fill="#0891b2" opacity="0.9"/>
  <circle cx="385" cy="477" r="4" fill="#0891b2" opacity="0.6"/>
  <circle cx="402" cy="477" r="4" fill="#0891b2" opacity="0.3"/>

  <!-- === Keyboard === -->
  <!-- Keyboard deck -->
  <path d="M 260 565 L 330 560 L 930 560 L 1000 565 L 1000 590 Q 1000 600 990 600 L 270 600 Q 260 600 260 590 Z" fill="url(#keyboardGrad)" stroke="#1e293b" stroke-width="2"/>

  <!-- Keyboard rows -->
  <!-- Row 1 -->
  <g fill="#1e293b" stroke="#334155" stroke-width="0.5">
    <!-- Generate key blocks row 1 -->
    <rect x="340" y="568" width="26" height="16" rx="3" fill="#253345"/>
    <rect x="372" y="568" width="26" height="16" rx="3" fill="#253345"/>
    <rect x="404" y="568" width="26" height="16" rx="3" fill="#253345"/>
    <rect x="436" y="568" width="26" height="16" rx="3" fill="#253345"/>
    <rect x="468" y="568" width="26" height="16" rx="3" fill="#253345"/>
    <rect x="500" y="568" width="26" height="16" rx="3" fill="#253345"/>
    <rect x="532" y="568" width="26" height="16" rx="3" fill="#253345"/>
    <rect x="564" y="568" width="26" height="16" rx="3" fill="#253345"/>
    <rect x="596" y="568" width="26" height="16" rx="3" fill="#0891b2" opacity="0.7"/>
    <rect x="628" y="568" width="26" height="16" rx="3" fill="#253345"/>
    <rect x="660" y="568" width="26" height="16" rx="3" fill="#253345"/>
    <rect x="692" y="568" width="26" height="16" rx="3" fill="#253345"/>
    <rect x="724" y="568" width="26" height="16" rx="3" fill="#253345"/>
    <rect x="756" y="568" width="26" height="16" rx="3" fill="#253345"/>
    <rect x="788" y="568" width="26" height="16" rx="3" fill="#253345"/>
    <!-- Spacebar -->
    <rect x="450" y="588" width="360" height="10" rx="3" fill="#1a2840"/>
  </g>

  <!-- Laptop trackpad -->
  <rect x="560" y="602" width="140" height="90" rx="8" fill="#1a2535" stroke="#334155" stroke-width="1" opacity="0.8"/>

  <!-- Laptop base bottom -->
  <ellipse cx="630" cy="600" rx="370" ry="8" fill="#0f172a" opacity="0.6"/>

  <!-- === Floating code snippets (background decoration) === -->
  <!-- Left floating element -->
  <g transform="translate(60, 300)" opacity="0.4" filter="url(#screenglow)">
    <rect width="180" height="110" rx="8" fill="#0c1f35" stroke="#0891b2" stroke-width="1"/>
    <rect x="12" y="16" width="50" height="6" rx="3" fill="#0891b2"/>
    <rect x="12" y="30" width="130" height="5" rx="2" fill="#67e8f9" opacity="0.5"/>
    <rect x="12" y="42" width="100" height="5" rx="2" fill="#67e8f9" opacity="0.4"/>
    <rect x="12" y="54" width="120" height="5" rx="2" fill="#67e8f9" opacity="0.3"/>
    <rect x="12" y="70" width="90" height="5" rx="2" fill="#0891b2" opacity="0.6"/>
    <rect x="12" y="84" width="140" height="5" rx="2" fill="#67e8f9" opacity="0.3"/>
  </g>

  <!-- Right floating element -->
  <g transform="translate(1020, 220)" opacity="0.4" filter="url(#screenglow)">
    <rect width="180" height="110" rx="8" fill="#0c1f35" stroke="#0891b2" stroke-width="1"/>
    <rect x="12" y="16" width="70" height="6" rx="3" fill="#22d3ee"/>
    <rect x="12" y="30" width="140" height="5" rx="2" fill="#67e8f9" opacity="0.5"/>
    <rect x="12" y="42" width="110" height="5" rx="2" fill="#67e8f9" opacity="0.3"/>
    <rect x="12" y="54" width="90" height="5" rx="2" fill="#22d3ee" opacity="0.5"/>
    <rect x="12" y="68" width="130" height="5" rx="2" fill="#67e8f9" opacity="0.3"/>
    <rect x="12" y="84" width="80" height="5" rx="2" fill="#67e8f9" opacity="0.4"/>
  </g>

  <!-- Decorative sparkles -->
  <g stroke="#0891b2" stroke-width="1.5" opacity="0.5">
    <line x1="200" y1="120" x2="200" y2="140"/>
    <line x1="190" y1="130" x2="210" y2="130"/>
  </g>
  <g stroke="#67e8f9" stroke-width="1.5" opacity="0.4">
    <line x1="1100" y1="100" x2="1100" y2="120"/>
    <line x1="1090" y1="110" x2="1110" y2="110"/>
  </g>
  <g stroke="#0891b2" stroke-width="1" opacity="0.4">
    <line x1="120" y1="600" x2="120" y2="616"/>
    <line x1="112" y1="608" x2="128" y2="608"/>
  </g>

  <!-- Corner accents -->
  <path d="M 30 30 L 80 30 L 80 35 L 35 35 L 35 80 L 30 80 Z" fill="#0891b2" opacity="0.3"/>
  <path d="M 1230 30 L 1180 30 L 1180 35 L 1225 35 L 1225 80 L 1230 80 Z" fill="#0891b2" opacity="0.3"/>
  <path d="M 30 720 L 80 720 L 80 715 L 35 715 L 35 670 L 30 670 Z" fill="#0891b2" opacity="0.2"/>
  <path d="M 1230 720 L 1180 720 L 1180 715 L 1225 715 L 1225 670 L 1230 670 Z" fill="#0891b2" opacity="0.2"/>
</svg>
